name: PR Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'codex/**'

permissions:
  contents: read

jobs:
  scope:
    name: Detect project surface
    runs-on: ubuntu-latest
    outputs:
      has_backend: ${{ steps.detect.outputs.has_backend }}
      has_frontend: ${{ steps.detect.outputs.has_frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: detect
        name: Detect backend and frontend
        shell: bash
        run: |
          if [ -f backend/requirements.txt ]; then
            echo "has_backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_backend=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f frontend/package.json ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi

  backend-tests:
    name: Backend tests
    needs: scope
    if: needs.scope.outputs.has_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest

  frontend-build:
    name: Frontend build
    needs: scope
    if: needs.scope.outputs.has_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  bootstrap-policy:
    name: Bootstrap policy
    needs: scope
    if: needs.scope.outputs.has_backend != 'true' && needs.scope.outputs.has_frontend != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm bootstrap-safe branch
        run: echo "No backend/frontend app surface detected; bootstrap or documentation-only branch is valid."